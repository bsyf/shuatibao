    area.innerHTML += html;

    // ===== 事件绑定 =====
    // 答题卡
    area.querySelectorAll('.grid-item').forEach(el => {
        el.addEventListener('click', function() {
            const idx = parseInt(this.dataset.idx);
            if (!isNaN(idx)) {
                state.currentIndex = idx;
                render();
            }
        });
    });

    // 选项
    if (!state.studyMode) {
        area.querySelectorAll('.option-item:not(.disabled)').forEach(el => {
            el.addEventListener('click', function() {
                if (this.classList.contains('disabled')) return;
                const opt = this.dataset.opt;
                const key = qkey(qSubject, qType, q.id);
                const isMulti = (type.includes('多选') || type === '多选题');
                if (isMulti) {
                    if (state.answers[key]) return;   // 已判分：重选请用「重置」
                    let parts = state.pending[key] ? state.pending[key].split('') : [];
                    if (parts.includes(opt)) parts = parts.filter(p => p !== opt);
                    else parts.push(opt);
                    parts.sort();
                    state.pending[key] = parts.join('');
                    const need = (q.answer.match(/[A-Za-z]/g) || []).length;
                    if (need > 0 && parts.length >= need) {
                        // 凑满正确数量：判分并揭示
                        recordAnswer(qSubject, qType, q.id, state.pending[key], q.answer);
                        state.showExplanation[key] = true;
                        delete state.pending[key];
                    }
                    render();
                    return;
                }
                // 单选 / 判断题：即时判分
                recordAnswer(qSubject, qType, q.id, opt, q.answer);
                state.showExplanation[key] = true;

        document.getElementById('toggleAnswerBtn')?.addEventListener('click', () => {

            render();

            delete state.pending[key];
            delete state.blankInput[key];
            delete state.showExplanation[key];

        document.getElementById('blankSubmit')?.addEventListener('click', () => {

            state.blankInput[key] = v;
            if (normBlank(v) === normBlank(q.answer)) {
                recordAnswer(qSubject, qType, q.id, q.answer, q.answer);   // 自动判对

    document.getElementById('beginnerBtn')?.addEventListener('click', () => {

    // 英语生词：点单词标记/取消
    area.querySelectorAll('.word').forEach(el => el.addEventListener('click', function (e) {

        render();
    }));

    document.getElementById('transBtn')?.addEventListener('click', () => {
        toggleTranslation(qSubject, qType, q.id);
    });

    // 导航
    document.getElementById('prevBtn')?.addEventListener('click', () => {
        if (state.currentIndex > 0) {
            state.currentIndex--;
            render();
        }
    });
    document.getElementById('nextBtn')?.addEventListener('click', () => {
        const questions = getFilteredQuestions(state.currentSubject, state.currentType);
        if (state.currentIndex < questions.length - 1) {
            state.currentIndex++;
            render();
        }
    });
    document.getElementById('nextGroupBtn')?.addEventListener('click', () => {
        const t = nextTypeTarget();
        if (t) {
            state.currentSubject = t.subject;
            state.currentType = t.type;
            state.currentIndex = 0;
            render();
        }
    });

    // 数据菜单
    const statsBar = document.getElementById('statsBar');
    const dataMenu = document.getElementById('dataMenu');
    if (statsBar) {
        statsBar.addEventListener('click', function(e) {
            if (e.target.closest('.data-menu')) return;
            dataMenu.classList.toggle('show');
        });
    }
    document.getElementById('exportData')?.addEventListener('click', function() {
        const data = JSON.stringify(serializeState());
        const encoded = btoa(encodeURIComponent(data));
        prompt('复制以下密文保存到备忘录（换设备时用于恢复全部进度）：', encoded);
    });
    document.getElementById('importData')?.addEventListener('click', function() {
        document.getElementById('dataInput').style.display = 'block';
        document.getElementById('confirmImport').style.display = 'block';
    });
    document.getElementById('confirmImport')?.addEventListener('click', function() {
        const val = document.getElementById('dataInput').value.trim();
        if (!val) return alert('请粘贴密文');
        try {
            const decoded = decodeURIComponent(atob(val));
            const parsed = JSON.parse(decoded);
            if (parsed && parsed.answers) {
                // 新格式：完整进度
                PERSIST_FIELDS.forEach(k => { if (parsed[k] !== undefined) state[k] = parsed[k]; });
            } else {
                // 旧格式：仅答题记录
                state.answers = parsed;
            }
            applyStateValidation();
            alert('导入成功！');
            dataMenu.classList.remove('show');
            render();
        } catch(e) {
            alert('密文无效，请重新复制');
        }
    });
    document.getElementById('menuVocab')?.addEventListener('click', function() {
        dataMenu.classList.remove('show');
        renderVocabBook();
    });
    document.querySelectorAll('#fontScaleRow button').forEach(b => {
        if (b.dataset.fs === state.fontScale) b.classList.add('sel');
        b.addEventListener('click', function() {
            state.fontScale = this.dataset.fs;
            render();
        });
    });
    document.getElementById('menuAddQ')?.addEventListener('click', function() {
        dataMenu.classList.remove('show');
        openQuestionEditor('add', qSubject, qType);
    });
    document.getElementById('menuEditQ')?.addEventListener('click', function() {
        dataMenu.classList.remove('show');
        openQuestionEditor('edit', qSubject, qType, q.id);
    });
    document.getElementById('menuExportQBank')?.addEventListener('click', function() {
        dataMenu.classList.remove('show');
        exportQBank();
    });
    document.getElementById('menuImportQBank')?.addEventListener('click', function() {
        dataMenu.classList.remove('show');
        openBankManager();
    });
    document.getElementById('redoType')?.addEventListener('click', function() {
        dataMenu.classList.remove('show');
        if (confirm('重做本组：清空「' + qSubject + ' · ' + qType + '」的答题进度并从头开始？\n（收藏和复习队列不受影响）')) {
            resetScope(qSubject, qType);
            alert('已清空本组进度，可以重新刷了');
        }
    });
    document.getElementById('redoSubject')?.addEventListener('click', function() {
        dataMenu.classList.remove('show');
        if (confirm('重做本科目：清空「' + qSubject + '」全部题型的答题进度并从头开始？\n（收藏和复习队列不受影响）')) {
            resetScope(qSubject, null);
            alert('已清空本科目进度，可以重新刷了');
        }
    });
    document.getElementById('resetAllData')?.addEventListener('click', function() {
        if (confirm('确定要重置所有科目的答题进度吗？此操作不可撤销！')) {
            state.answers = {};
            state.showExplanation = {};
            state.showBeginner = {};
            state.showTranslation = {};
            state.shuffledIndices = {};
            state.shuffled = false;
            render();
            alert('已重置所有进度');
        }
    });
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.stats-bar')) {
            if (dataMenu) dataMenu.classList.remove('show');
        }
    });

    updateProgress();
    typesetMath(area);
}

function closeOverlay() { const o = document.getElementById('overlay'); if (o) o.remove(); }
function showOverlay(innerHtml) {
    closeOverlay();
    const o = document.createElement('div');
    o.id = 'overlay'; o.className = 'overlay';
    o.innerHTML = '<div class="overlay-card">' + innerHtml + '</div>';
    o.addEventListener('click', e => { if (e.target === o) closeOverlay(); });
    document.body.appendChild(o);
    typesetMath(o);
    return o;
}
function renderStats() {
    const st = computeStats();
    const rate = st.totalAns ? Math.round(st.totalCorrect / st.totalAns * 100) : 0;
    const barRow = (label, o) => {
        const p = Math.round(o.c / o.a * 100);
        return `<div class="stat-row"><span style="flex:0 0 96px;">${label}</span><span class="bar"><div style="width:${p}%;background:${p >= 60 ? '#22c55e' : '#ef4444'}"></div></span><span style="flex:0 0 78px;text-align:right;">${p}% (${o.c}/${o.a})</span></div>`;
    };
    let html = '<span class="ov-close" id="ovClose">✕</span><h2>📈 统计与薄弱点</h2>';
    html += `<div style="font-size:13px;color:var(--text-muted);margin-bottom:8px;">已答 <b>${st.totalAns}</b> 题 · 总正确率 <b>${rate}%</b> · 🔥 连续 ${studyStreak()} 天</div>`;
    const subs = Object.keys(st.bySubject);
    html += '<div style="font-weight:600;font-size:13px;margin:10px 0 2px;">各科正确率</div>';
    html += subs.length ? subs.map(s => barRow(s, st.bySubject[s])).join('') : '<div style="font-size:12px;color:var(--text-muted);">还没有答题记录</div>';
    const types = Object.keys(st.byType);
    if (types.length) {
        html += '<div style="font-weight:600;font-size:13px;margin:14px 0 2px;">各题型正确率（薄弱项靠红色）</div>';
        html += types.sort((a, b) => (st.byType[a].c / st.byType[a].a) - (st.byType[b].c / st.byType[b].a)).map(t => barRow(t, st.byType[t])).join('');
    }
    if (st.wrongList.length) {
        html += '<div style="font-weight:600;font-size:13px;margin:14px 0 2px;">错题列表（' + st.wrongList.length + '）</div>';
        html += st.wrongList.slice(0, 10).map(w => `<div style="font-size:12px;color:var(--text-secondary);padding:4px 0;border-bottom:1px dashed var(--border-color);">[${w.s}] ${w.q.slice(0, 38)}${w.q.length > 38 ? '…' : ''}</div>`).join('');
    }
    html += '<button class="nav-btn next" id="ovDone" style="margin-top:16px;">关闭</button>';
    showOverlay(html);
    document.getElementById('ovClose').onclick = closeOverlay;
    document.getElementById('ovDone').onclick = closeOverlay;
}

// 跳到指定题目（清掉会隐藏它的过滤模式）
function jumpToQuestion(s, t, id) {
    state.reviewMode = false; state.wrongOnly = false; state.favOnly = false;
    state.currentSubject = s; state.currentType = t;
    const qs = getFilteredQuestions(s, t);
    const i = qs.findIndex(x => x.id === id);
    state.currentIndex = i >= 0 ? i : 0;
    closeOverlay();
    render();
}
function searchQuestions(kw) {
    kw = kw.trim().toLowerCase();
    if (!kw) return [];
    const out = [];
    for (const s of state.subjects) {
        const types = DATA[s].types;
        for (const t in types) {
            for (const item of types[t]) {
                const hay = ((item.question || '') + ' ' + (item.answer || '') + ' ' + ((item.options || []).join(' '))).toLowerCase();
                if (hay.includes(kw)) { out.push({ s, t, item }); if (out.length >= 50) return out; }
            }
        }
    }
    return out;
}
function renderSearch() {
    let html = '<span class="ov-close" id="ovClose">✕</span><h2>🔍 搜索题目</h2>';
    html += '<input id="searchInput" type="text" autocomplete="off" placeholder="输入关键词（题干 / 答案 / 选项）" style="width:100%;padding:9px 11px;border:1px solid var(--border-color);border-radius:8px;background:var(--bg-card);color:var(--text-primary);font-size:14px;margin-bottom:10px;">';
    html += '<div id="searchResults" style="max-height:52vh;overflow-y:auto;"></div>';
    showOverlay(html);
    document.getElementById('ovClose').onclick = closeOverlay;
    const inp = document.getElementById('searchInput');
    const box = document.getElementById('searchResults');
    function update() {
        if (!inp.value.trim()) { box.innerHTML = '<div style="font-size:12px;color:var(--text-muted);">输入关键词开始搜索…</div>'; return; }
        const res = searchQuestions(inp.value);
        if (!res.length) { box.innerHTML = '<div style="font-size:13px;color:var(--text-muted);">没有找到匹配的题目</div>'; return; }
        box.innerHTML = res.map((r, i) =>
            `<div class="search-hit" data-i="${i}" style="padding:8px 6px;border-bottom:1px solid var(--border-color);cursor:pointer;font-size:13px;line-height:1.5;">
                <span style="color:var(--text-muted);font-size:11px;">[${r.s} / ${r.t}]</span><br>${escapeHtml(r.item.question.slice(0, 60))}${r.item.question.length > 60 ? '…' : ''}
            </div>`).join('') + (res.length >= 50 ? '<div style="font-size:11px;color:var(--text-muted);padding:6px 0;">仅显示前 50 条，请补充关键词缩小范围</div>' : '');
        box.querySelectorAll('.search-hit').forEach(el => el.onclick = () => { const r = res[+el.dataset.i]; jumpToQuestion(r.s, r.t, r.item.id); });
    }
    inp.addEventListener('input', update);
    update();
    setTimeout(() => inp.focus(), 50);
}

// 演算草稿区（手写画板，临时不保存）
// ================================================================
function openScratchpad() {
    closeOverlay();
    const o = document.createElement('div');
    o.id = 'overlay'; o.className = 'overlay';
    o.innerHTML = `
      <div class="overlay-card" style="max-width:520px;">
        <span class="ov-close" id="ovClose">✕</span>
        <h2>✏️ 演算草稿区</h2>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:6px;">用手指或鼠标在下面手写演算，仅临时使用、关闭即清空。</div>
        <div class="flex-row" style="gap:6px;margin-bottom:8px;">
          <button class="toggle-answer-btn active" id="penBtn">🖊 笔</button>
          <button class="toggle-answer-btn" id="eraserBtn">🩹 橡皮</button>
          <button class="toggle-answer-btn" id="clearBtn" style="background:#fee2e2;color:#b91c1c;">🗑 清空</button>
        </div>
        <canvas id="scratchCanvas" style="width:100%;height:60vh;border:1px solid var(--border-color);border-radius:10px;background:#fff;touch-action:none;display:block;"></canvas>
      </div>`;
    document.body.appendChild(o);
    o.addEventListener('click', e => { if (e.target === o) closeOverlay(); });
    document.getElementById('ovClose').onclick = closeOverlay;
    const cv = document.getElementById('scratchCanvas');
    const ctx = cv.getContext('2d');
    const rect = cv.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    cv.width = rect.width * dpr; cv.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    let drawing = false, erase = false, lastX = 0, lastY = 0;
    function pos(e) { const r = cv.getBoundingClientRect(); const t = e.touches ? e.touches[0] : e; return { x: t.clientX - r.left, y: t.clientY - r.top }; }
    function start(e) { drawing = true; const p = pos(e); lastX = p.x; lastY = p.y; e.preventDefault(); }
    function move(e) {
        if (!drawing) return; const p = pos(e);
        ctx.strokeStyle = erase ? '#ffffff' : '#1e293b';
        ctx.lineWidth = erase ? 22 : 2.5;
        ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y); ctx.stroke();
        lastX = p.x; lastY = p.y; e.preventDefault();
    }
    function end() { drawing = false; }
    cv.addEventListener('mousedown', start); cv.addEventListener('mousemove', move); window.addEventListener('mouseup', end);
    cv.addEventListener('touchstart', start, { passive: false }); cv.addEventListener('touchmove', move, { passive: false }); cv.addEventListener('touchend', end);
    document.getElementById('penBtn').onclick = function () { erase = false; this.classList.add('active'); document.getElementById('eraserBtn').classList.remove('active'); };
    document.getElementById('eraserBtn').onclick = function () { erase = true; this.classList.add('active'); document.getElementById('penBtn').classList.remove('active'); };
    document.getElementById('clearBtn').onclick = function () { ctx.clearRect(0, 0, cv.width, cv.height); };
}

function isObjectiveItem(type, item) { return type === '判断题' || (item.options && item.options.length > 0); }
let examCfg = { subject: '__ALL__', count: 20, minutes: 0 };
function examCandidates(scope) {
    const out = [];
    const subs = scope === '__ALL__' ? state.subjects : [scope];
    for (const s of subs) { const types = DATA[s].types; for (const t in types) { for (const item of types[t]) { if (isObjectiveItem(t, item)) out.push({ s, t, id: item.id }); } } }
    return out;
}
function openExamConfig() {
    const total = examCandidates(examCfg.subject).length;
    const subBtns = ['__ALL__'].concat(state.subjects).map(s => `<button data-sub="${s}" class="${examCfg.subject === s ? 'sel' : ''}">${s === '__ALL__' ? '全部科目' : s}</button>`).join('');
    const cntBtns = [10, 20, 30, 50].map(c => `<button data-cnt="${c}" class="${examCfg.count === c ? 'sel' : ''}">${c}题</button>`).join('') + `<button data-cnt="0" class="${examCfg.count === 0 ? 'sel' : ''}">全部</button>`;
    const minBtns = [0, 10, 20, 30].map(m => `<button data-min="${m}" class="${examCfg.minutes === m ? 'sel' : ''}">${m === 0 ? '不计时' : m + '分钟'}</button>`).join('');
    let html = '<span class="ov-close" id="ovClose">✕</span><h2>📝 模考设置</h2>';
    html += '<div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">只抽客观题（单选/多选/判断/选词填空），可自动评分。</div>';
    html += '<div style="font-weight:600;font-size:13px;">科目</div><div class="exam-opt" id="exSub">' + subBtns + '</div>';
    html += '<div style="font-weight:600;font-size:13px;">题数</div><div class="exam-opt" id="exCnt">' + cntBtns + '</div>';
    html += '<div style="font-weight:600;font-size:13px;">计时</div><div class="exam-opt" id="exMin">' + minBtns + '</div>';
    html += `<div style="font-size:12px;color:var(--text-muted);margin-bottom:10px;">可用客观题：<b>${total}</b> 题</div>`;
    html += '<button class="nav-btn next" id="exStart">开始模考</button>';
    showOverlay(html);
    document.getElementById('ovClose').onclick = closeOverlay;
    document.querySelectorAll('#exSub button').forEach(b => b.onclick = () => { examCfg.subject = b.dataset.sub; openExamConfig(); });
    document.querySelectorAll('#exCnt button').forEach(b => b.onclick = () => { examCfg.count = +b.dataset.cnt; openExamConfig(); });
    document.querySelectorAll('#exMin button').forEach(b => b.onclick = () => { examCfg.minutes = +b.dataset.min; openExamConfig(); });
    document.getElementById('exStart').onclick = startExam;
}
function startExam() {
    let cand = examCandidates(examCfg.subject);
    if (!cand.length) { alert('该范围没有可用的客观题'); return; }
    shuffleArray(cand);
    const n = examCfg.count === 0 ? cand.length : Math.min(examCfg.count, cand.length);
    state.exam = { items: cand.slice(0, n), answers: {}, index: 0, minutes: examCfg.minutes, startAt: Date.now(), submitted: false };
    closeOverlay();
    render();
}
function findQuestion(s, t, id) {
    const item = (DATA[s] && DATA[s].types[t] || []).find(x => x.id === id);
    if (!item) return null;
    return expandQuestion(Object.assign({}, item, { _subject: s }), t);
}
let examTimerId = null;
function clearExamTimer() { if (examTimerId) { clearInterval(examTimerId); examTimerId = null; } }
function examRemaining() { if (!state.exam || !state.exam.minutes) return null; return state.exam.minutes * 60 - Math.floor((Date.now() - state.exam.startAt) / 1000); }
function fmtTime(sec) { sec = Math.max(0, sec); return Math.floor(sec / 60) + ':' + String(sec % 60).padStart(2, '0'); }
function gradeExam() {
    const ex = state.exam; let correct = 0;
    ex.items.forEach((it, i) => { const q = findQuestion(it.s, it.t, it.id); if (q && ex.answers[i] !== undefined && ex.answers[i] === q.answer) correct++; });
    return correct;
}
function submitExam() { clearExamTimer(); state.exam.submitted = true; render(); }
function exitExam() { clearExamTimer(); state.exam = null; render(); }
function renderExamOptions(q, selected) {
    const type = q._type; let html = '';
    if (type === '判断题') {
        html += '<div class="options">';
        ['正确', '错误'].forEach((opt, i) => { const sel = selected === opt; html += `<div class="option-item ${sel ? 'selected' : ''}" data-exopt="${opt}"><span class="label">${'AB'[i]}.</span><span class="text">${opt}</span>${sel ? '<span class="check-mark">✅</span>' : ''}</div>`; });
        html += '</div>';
    } else if (q.options && q.options.length) {
        const isMulti = type.includes('多选');
        html += `<div class="${type === '选词填空' ? 'options-grid' : 'options'}">`;
        const L = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        q.options.forEach((opt, i) => { const lab = L[i]; const sel = selected && (isMulti ? selected.includes(lab) : selected === lab); const txt = opt.replace(/^[A-Za-z][\.\)、]\s*/, ''); html += `<div class="option-item ${sel ? 'selected' : ''}" data-exopt="${lab}"><span class="label">${lab}.</span><span class="text">${txt}</span>${sel ? '<span class="check-mark">✅</span>' : ''}</div>`; });
        html += '</div>';
        if (isMulti) html += '<div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">💡 多选题</div>';
    }
    return html;
}
function bindExamOptions(area) {
    const ex = state.exam; const cur = ex.items[ex.index]; const q = findQuestion(cur.s, cur.t, cur.id); const type = q._type; const i = ex.index;
    area.querySelectorAll('.option-item').forEach(el => el.addEventListener('click', function () {
        const opt = this.dataset.exopt;
        if (type.includes('多选')) {
            let parts = (ex.answers[i] || '') ? ex.answers[i].split('') : [];
            if (parts.includes(opt)) parts = parts.filter(p => p !== opt); else parts.push(opt);
            parts.sort(); ex.answers[i] = parts.join('');
        } else { ex.answers[i] = opt; }
        render();
    }));
}
function renderExam() {
    clearExamTimer();
    document.getElementById('subjectTabs').innerHTML = '';
    document.getElementById('typeFilters').innerHTML = '';
    const area = document.getElementById('questionArea');
    const ex = state.exam;
    if (ex.submitted) { renderExamResult(area); return; }
    const rem = examRemaining();
    if (rem !== null && rem <= 0) { submitExam(); return; }
    const cur = ex.items[ex.index];
    const q = findQuestion(cur.s, cur.t, cur.id);
    const total = ex.items.length;
    document.getElementById('progressText').textContent = '模考 ' + (ex.index + 1) + '/' + total;
    let html = '<div class="grid-container"><div class="grid-title"><span>📝 模考答题卡</span>' + (rem !== null ? `<span id="examTimer" style="color:#ef4444;font-weight:700;">⏱ ${fmtTime(rem)}</span>` : '<span>不计时</span>') + '</div><div class="grid">';
    ex.items.forEach((it, i) => { let cls = 'grid-item'; if (i === ex.index) cls += ' current'; if (ex.answers[i] !== undefined && ex.answers[i] !== '') cls += ' answered'; html += `<div class="${cls}" data-exidx="${i}">${i + 1}</div>`; });
    html += '</div></div>';
    html += `<div class="q-header"><span class="q-number">${ex.index + 1} / ${total}</span><span class="q-type-badge">${q._subject} · ${q._type}</span></div>`;
    html += `<div class="q-text">${q.question.replace(/\n/g, '<br>')}</div>`;
    html += renderExamOptions(q, ex.answers[ex.index]);
    html += `<div class="nav-area"><button class="nav-btn prev" id="exPrev" ${ex.index === 0 ? 'disabled' : ''}>⬅ 上一题</button>`;
    html += ex.index < total - 1 ? '<button class="nav-btn next" id="exNext">下一题 ➔</button>' : '<button class="nav-btn next" id="exSubmit" style="background:#ef4444;">✅ 交卷</button>';
    html += '</div>';
    html += '<div class="flex-row" style="margin-top:10px;gap:6px;"><button class="toggle-answer-btn" id="exSubmitAny">提前交卷</button><button class="toggle-answer-btn" id="exQuit" style="background:#fee2e2;color:#b91c1c;">退出模考</button></div>';
    area.innerHTML = html;
    area.querySelectorAll('.grid-item').forEach(el => el.onclick = function () { ex.index = +this.dataset.exidx; render(); });
    bindExamOptions(area);
    document.getElementById('exPrev')?.addEventListener('click', () => { if (ex.index > 0) { ex.index--; render(); } });
    document.getElementById('exNext')?.addEventListener('click', () => { if (ex.index < total - 1) { ex.index++; render(); } });
    document.getElementById('exSubmit')?.addEventListener('click', () => { if (confirm('确定交卷吗？')) submitExam(); });
    document.getElementById('exSubmitAny')?.addEventListener('click', () => { if (confirm('确定提前交卷吗？')) submitExam(); });
    document.getElementById('exQuit')?.addEventListener('click', () => { if (confirm('退出将放弃本次模考，确定？')) exitExam(); });
    if (rem !== null) { examTimerId = setInterval(() => { const r = examRemaining(); if (r <= 0) { submitExam(); return; } const el = document.getElementById('examTimer'); if (el) el.textContent = '⏱ ' + fmtTime(r); }, 1000); }
    typesetMath(area);
}
function renderExamResult(area) {
    const ex = state.exam; const total = ex.items.length; const correct = gradeExam();
    const pct = total ? Math.round(correct / total * 100) : 0;
    const grade = pct >= 90 ? '优秀 🏆' : pct >= 80 ? '良好 👍' : pct >= 60 ? '及格 ✅' : '继续加油 💪';
    document.getElementById('progressText').textContent = '模考结果';
    let html = `<div class="grid-container" style="text-align:center;padding:18px;"><div style="font-size:32px;font-weight:800;color:${pct >= 60 ? '#22c55e' : '#ef4444'};">${pct}分</div><div style="margin:6px 0;font-size:14px;">答对 ${correct} / ${total} 题 · ${grade}</div></div>`;
    html += '<div style="font-weight:600;margin:8px 0;">逐题回顾</div>';
    ex.items.forEach((it, i) => {
        const q = findQuestion(it.s, it.t, it.id); const ans = ex.answers[i]; const ok = ans !== undefined && ans !== '' && ans === q.answer;
        html += `<div style="padding:8px 10px;border-radius:8px;margin-bottom:6px;background:var(--bg-card);border-left:4px solid ${ok ? '#22c55e' : '#ef4444'};">`;
        html += `<div style="font-size:13px;">${i + 1}. <span style="color:var(--text-muted);">[${q._subject}/${q._type}]</span> ${q.question.replace(/\n/g, '<br>')}</div>`;
        html += `<div style="font-size:12px;margin-top:4px;">你的答案：<b style="color:${ok ? '#22c55e' : '#ef4444'};">${ans === undefined || ans === '' ? '(未答)' : ans}</b> ｜ 正确：<b style="color:#22c55e;">${q.answer}</b></div>`;
        if (q.explanation) html += `<div style="font-size:12px;color:var(--text-muted);margin-top:4px;">📖 ${q.explanation}</div>`;
        html += '</div>';
    });
    html += '<div class="nav-area"><button class="nav-btn prev" id="exAgain">🔄 再来一次</button><button class="nav-btn next" id="exDone">完成</button></div>';
    area.innerHTML = html;
    document.getElementById('exAgain').onclick = () => { state.exam = null; render(); openExamConfig(); };
    document.getElementById('exDone').onclick = exitExam;
    typesetMath(area);
}

// ================================================================
// 初始化
// ================================================================
function init() {
    // 0) 先从本地恢复已导入的题库（没有则进导入引导页）
    loadQBank();
    state.subjects = Object.keys(DATA);
    // 1) 设默认位置
    const firstSubject = state.subjects[0];
    state.currentSubject = firstSubject;
    const types = firstSubject ? getTypes(firstSubject) : [];
    state.currentType = types.length > 0 ? types[0] : null;
    state.currentIndex = 0;
    // 2) 用上次保存的进度覆盖默认值，再校正合法性
    loadState();
    applyStateValidation();
    render();

    document.getElementById('modeToggle').addEventListener('click', function() {
        state.studyMode = !state.studyMode;
        render();
    });
    document.getElementById('wrongToggle').addEventListener('click', function() {
        state.wrongOnly = !state.wrongOnly;
        if (state.wrongOnly) { state.favOnly = false; state.reviewMode = false; }
        state.currentIndex = 0;
        render();
    });
    document.getElementById('reviewToggle').addEventListener('click', function() {
        state.reviewMode = !state.reviewMode;
        if (state.reviewMode) {
            if (reviewCount() === 0) { state.reviewMode = false; alert(reviewPoolTotal() > 0 ? '今天没有要复习的题啦，明天再来～' : '复习队列是空的～先去刷题，答错的题会自动进来。'); return; }
            state.wrongOnly = false; state.favOnly = false; state.studyMode = false;
        }
        state.currentIndex = 0;
        render();
    });
    document.getElementById('favToggle').addEventListener('click', function() {
        state.favOnly = !state.favOnly;
        if (state.favOnly) {
            if (favCount() === 0) { state.favOnly = false; alert('还没有收藏的题～点题目右上角「☆ 收藏」加进来。'); return; }
            state.wrongOnly = false; state.reviewMode = false;
        }
        state.currentIndex = 0;
        render();
    });
    document.getElementById('examBtn').addEventListener('click', openExamConfig);
    document.getElementById('searchBtn').addEventListener('click', function() {
        if (!hasQBank()) { alert('请先导入题库'); return; }
        renderSearch();
    });
    document.getElementById('scratchBtn').addEventListener('click', openScratchpad);
    document.getElementById('statsBtn').addEventListener('click', renderStats);
    document.getElementById('shuffleBtn').addEventListener('click', function() {
        reshuffleCurrent();
    });
    document.getElementById('darkToggle').addEventListener('click', function() {
        state.theme = (state.theme === 'dark') ? 'default' : 'dark';
        render();
    });
    applyCustomBg();   // 启动时套用已保存的自定义背景图

    // —— 底部导航栏（复用顶部隐藏按钮的逻辑）——
    document.getElementById('bnHome').addEventListener('click', function() {
        state.wrongOnly = false; state.favOnly = false; state.reviewMode = false;
        state.currentIndex = 0;
        render();
    });
    document.getElementById('bnWrong').addEventListener('click', () => document.getElementById('wrongToggle').click());
    document.getElementById('bnFav').addEventListener('click', () => document.getElementById('favToggle').click());
    document.getElementById('bnReview').addEventListener('click', () => document.getElementById('reviewToggle').click());
    document.getElementById('bnMore').addEventListener('click', openMoreSheet);
}

init();

// KaTeX 是 defer 脚本，首屏渲染时可能还没加载完；加载完成后补渲染一次当前页面的公式
window.addEventListener('load', function() {
    typesetMath(document.getElementById('questionArea'));
    typesetMath(document.getElementById('overlay'));
});

// PWA：注册 Service Worker（仅在 http(s) 下生效，本地 file:// 会静默跳过）
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
    window.addEventListener('load', function() {
        navigator.serviceWorker.register('service-worker.js').catch(function() {});
    });
}
</script>
